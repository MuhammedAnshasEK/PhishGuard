<!DOCTYPE html>
<html lang="en">

<head>
  <title>PhishGuard - Phishing Checker</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/open-iconic-bootstrap.min.css">
  <link rel="stylesheet" href="css/animate.css">
  <link rel="stylesheet" href="css/owl.carousel.min.css">
  <link rel="stylesheet" href="css/owl.theme.default.min.css">
  <link rel="stylesheet" href="css/magnific-popup.css">
  <link rel="stylesheet" href="css/aos.css">
  <link rel="stylesheet" href="css/ionicons.min.css">
  <link rel="stylesheet" href="css/flaticon.css">
  <link rel="stylesheet" href="css/icomoon.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .brand-logo {
      display: inline-block;
      font-family: "Montserrat", "Poppins", sans-serif;
      font-size: 25px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: transparent !important;
      background: linear-gradient(90deg, #a5f3fc 0%, #67e8f9 30%, #22d3ee 62%, #0ea5e9 82%, #0369a1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: transform 0.25s ease, letter-spacing 0.25s ease, filter 0.25s ease;
    }

    .ftco-navbar-light .navbar-brand.brand-logo,
    .ftco-navbar-light.scrolled .navbar-brand.brand-logo {
      color: transparent !important;
      -webkit-text-fill-color: transparent;
    }

    .ftco-navbar-light .navbar-nav .nav-item a[href^="checker.html"],
    .ftco-navbar-light .navbar-nav .nav-item.active a[href^="checker.html"] {
      color: #ef4444 !important;
    }

    .ftco-navbar-light .navbar-nav .nav-item a[href^="checker.html"]:hover,
    .ftco-navbar-light .navbar-nav .nav-item a[href^="checker.html"]:focus {
      color: #b91c1c !important;
    }

    #checker-section .heading-section h1.big.big-2 {
      color: #ef4444;
      text-shadow: none;
      transition: color 0.2s ease, text-shadow 0.2s ease, filter 0.2s ease;
    }

    #checker-section {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .checker-cyber-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .checker-cyber-bg::before {
      content: "";
      position: absolute;
      inset: -15% -10%;
      background:
        radial-gradient(circle at 18% 28%, rgba(16, 185, 129, 0.2) 0%, transparent 34%),
        radial-gradient(circle at 78% 72%, rgba(6, 182, 212, 0.16) 0%, transparent 38%),
        radial-gradient(circle at 55% 18%, rgba(244, 63, 94, 0.1) 0%, transparent 42%),
        linear-gradient(180deg, rgba(2, 6, 23, 0.1), rgba(2, 6, 23, 0.45));
      opacity: 0.68;
      animation: codeAuraShift 14s ease-in-out infinite;
    }

    .checker-cyber-bg::after {
      content: "if (threat > 70) { alert('phishing'); }   const hash = scan(url);   while (packet) { score += signal; }   SELECT domain, risk FROM feed WHERE risk > 60;   ";
      position: absolute;
      inset: -20% -8%;
      font-family: "Courier New", monospace;
      font-size: 12px;
      line-height: 1.9;
      letter-spacing: 0.07em;
      word-spacing: 0.45em;
      color: rgba(74, 222, 128, 0.3);
      white-space: pre-wrap;
      opacity: 0.82;
      animation: codeStreamMove 17s linear infinite;
    }

    .checker-cyber-bg .code-layer {
      position: absolute;
      inset: -18% -6%;
      opacity: 0.58;
    }

    .checker-cyber-bg .code-layer.grid {
      background:
        repeating-linear-gradient(90deg, rgba(34, 197, 94, 0.16) 0 1px, transparent 1px 54px),
        repeating-linear-gradient(0deg, rgba(16, 185, 129, 0.14) 0 1px, transparent 1px 28px);
      animation: codeGridDrift 11s linear infinite;
    }

    .checker-cyber-bg .code-layer.rain {
      background:
        repeating-linear-gradient(180deg,
          rgba(74, 222, 128, 0) 0 8px,
          rgba(74, 222, 128, 0.22) 8px 11px,
          rgba(74, 222, 128, 0) 11px 26px);
      transform: skewX(-8deg);
      animation: codeRainFall 8s linear infinite;
    }

    .checker-cyber-bg .code-layer.trace {
      background:
        linear-gradient(120deg, transparent 0%, rgba(6, 182, 212, 0.16) 46%, transparent 54%),
        linear-gradient(35deg, transparent 0%, rgba(244, 63, 94, 0.1) 44%, transparent 51%);
      animation: traceSweep 9s ease-in-out infinite;
    }

    #checker-section .container {
      position: relative;
      z-index: 2;
    }

    #checker-section .heading-section h1.big.big-2:hover {
      color: #ef4444;
      text-shadow: 0 0 12px rgba(248, 113, 113, 0.34), 0 0 24px rgba(239, 68, 68, 0.26);
      filter: brightness(1.08);
    }

    .threat-card {
      position: relative;
      border: 1px solid rgba(125, 211, 252, 0.22);
      box-shadow: 0 14px 34px rgba(2, 132, 199, 0.2);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .threat-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(125, 211, 252, 0.08), transparent 45%, rgba(14, 165, 233, 0.14));
    }

    .threat-card:hover {
      transform: translateY(-3px);
      border-color: rgba(125, 211, 252, 0.45);
      box-shadow: 0 18px 40px rgba(14, 165, 233, 0.26);
    }

    .threat-card.is-analyzing {
      border-color: rgba(74, 222, 128, 0.65);
      box-shadow: 0 18px 42px rgba(34, 197, 94, 0.35);
      background: linear-gradient(140deg, rgba(8, 47, 30, 0.95), rgba(20, 83, 45, 0.92)) !important;
      animation: analyzingPulse 1.15s ease-in-out infinite;
    }

    .threat-card.is-analyzing::before {
      background: linear-gradient(120deg, rgba(134, 239, 172, 0.2), transparent 45%, rgba(74, 222, 128, 0.24));
    }

    .brand-logo:hover {
      letter-spacing: 0.07em;
      transform: translateY(-1px);
      filter: brightness(1.15);
    }

    .theme-toggle-wrap {
      margin-left: 20px;
      display: flex;
      align-items: center;
    }

    .theme-toggle-btn {
      border: 0;
      background: transparent;
      padding: 0;
    }

    .theme-toggle-track {
      width: 62px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid rgba(125, 211, 252, 0.45);
      background: rgba(8, 47, 73, 0.55);
      display: inline-flex;
      align-items: center;
      padding: 3px;
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    .theme-toggle-thumb {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0f172a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: translateX(0);
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease;
    }

    .theme-icon-sun,
    .theme-icon-moon {
      font-size: 13px;
      line-height: 1;
    }

    .theme-icon-sun {
      display: none;
    }

    .theme-toggle-btn:hover .theme-toggle-track,
    .theme-toggle-btn:focus .theme-toggle-track {
      background: rgba(14, 116, 144, 0.8);
    }

    .theme-toggle-btn:focus {
      outline: none;
    }

    .theme-toggle-btn:focus .theme-toggle-track {
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
    }

    .visually-hidden {
      position: absolute !important;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .threat-card.is-risk {
      border-color: rgba(248, 113, 113, 0.62);
      box-shadow: 0 18px 42px rgba(239, 68, 68, 0.32);
      background: linear-gradient(140deg, rgba(69, 10, 10, 0.94), rgba(127, 29, 29, 0.9)) !important;
    }

    .threat-card.is-risk::before {
      background: linear-gradient(120deg, rgba(252, 165, 165, 0.2), transparent 45%, rgba(248, 113, 113, 0.24));
    }

    .threat-card.is-safe {
      border-color: rgba(74, 222, 128, 0.62);
      box-shadow: 0 18px 42px rgba(34, 197, 94, 0.3);
      background: linear-gradient(140deg, rgba(8, 47, 30, 0.95), rgba(20, 83, 45, 0.9)) !important;
    }

    .threat-card.is-safe::before {
      background: linear-gradient(120deg, rgba(134, 239, 172, 0.2), transparent 45%, rgba(74, 222, 128, 0.24));
    }

    #checker-section .form-control {
      border: 1px solid rgba(125, 211, 252, 0.25);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    #checker-section .form-control:focus {
      border-color: rgba(103, 232, 249, 0.9);
      box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.2);
      background-color: rgba(255, 255, 255, 0.98);
    }

    @keyframes threatCardFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes analyzingPulse {

      0%,
      100% {
        filter: saturate(1);
      }

      50% {
        filter: saturate(1.25);
      }
    }

    @keyframes cyberGridDrift {
      0% {
        transform: translate3d(-4%, -3%, 0) scale(1.03);
      }

      50% {
        transform: translate3d(3%, 2%, 0) scale(1.06);
      }

      100% {
        transform: translate3d(-4%, -3%, 0) scale(1.03);
      }
    }

    @keyframes cyberSignalSweep {
      0% {
        transform: translateX(-16%) translateY(0) skewX(-6deg);
        opacity: 0.16;
      }

      50% {
        transform: translateX(16%) translateY(-2%) skewX(-6deg);
        opacity: 0.34;
      }

      100% {
        transform: translateX(-16%) translateY(0) skewX(-6deg);
        opacity: 0.16;
      }
    }

    @keyframes codeGridDrift {
      0% {
        transform: translateY(0) translateX(0);
      }

      100% {
        transform: translateY(56px) translateX(18px);
      }
    }

    @keyframes codeStreamMove {
      0% {
        transform: translateY(-6%);
      }

      100% {
        transform: translateY(14%);
      }
    }

    @keyframes codeAuraShift {

      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(1.5%, -1.5%, 0) scale(1.04);
      }
    }

    @keyframes codeRainFall {
      0% {
        transform: translateY(-8%) skewX(-8deg);
      }

      100% {
        transform: translateY(12%) skewX(-8deg);
      }
    }

    @keyframes traceSweep {

      0%,
      100% {
        opacity: 0.4;
        transform: translateX(-10%);
      }

      50% {
        opacity: 0.7;
        transform: translateX(8%);
      }
    }

    body.light-mode {
      background: #f5f9ff;
      color: #111827;
    }

    body.light-mode .ftco-navbar-light {
      background: rgba(255, 255, 255, 0.96) !important;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
    }

    body.light-mode .ftco-navbar-light .navbar-nav .nav-item a {
      color: #0f172a !important;
    }

    body.light-mode .ftco-navbar-light .navbar-nav .nav-item a[href^="checker.html"],
    body.light-mode .ftco-navbar-light .navbar-nav .nav-item.active a[href^="checker.html"] {
      color: #ef4444 !important;
    }

    body.light-mode .theme-toggle-track {
      background: rgba(186, 230, 253, 0.95);
      border-color: rgba(14, 116, 144, 0.35);
    }

    body.light-mode .theme-toggle-thumb {
      transform: translateX(30px);
      background: #0f172a;
      color: #f8fbff;
    }

    body.light-mode .theme-icon-moon {
      display: none;
    }

    body.light-mode .theme-icon-sun {
      display: inline;
    }

    body.light-mode #checker-section .heading-section h2,
    body.light-mode #checker-section .heading-section p,
    body.light-mode #checker-section label.text-white {
      color: #0f172a !important;
    }

    body.light-mode .threat-card {
      background: rgba(255, 255, 255, 0.96) !important;
      border-color: rgba(148, 163, 184, 0.35);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
    }

    body.light-mode #checker-result {
      background: #0f172a !important;
      color: #e2e8f0 !important;
    }

    @media (max-width: 767.98px) {
      .brand-logo {
        font-size: 20px;
        letter-spacing: 0.04em;
      }

      .theme-toggle-wrap {
        margin: 10px 0 0;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark ftco_navbar ftco-navbar-light site-navbar-target" id="ftco-navbar">
    <div class="container">
      <span class="navbar-brand brand-logo">PhishGuard</span>
      <button class="navbar-toggler js-fh5co-nav-toggle fh5co-nav-toggle" type="button" data-toggle="collapse"
        data-target="#ftco-nav" aria-controls="ftco-nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="oi oi-menu"></span> Menu
      </button>

      <div class="collapse navbar-collapse" id="ftco-nav">
        <ul class="navbar-nav nav ml-auto">
          <li class="nav-item"><a href="index.html#home-section" class="nav-link"><span>Home</span></a></li>
          <li class="nav-item active"><a href="checker.html" class="nav-link active"><span>Threat Scan</span></a></li>
          <li class="nav-item"><a href="index.html#about-section" class="nav-link"><span>About</span></a></li>
          <li class="nav-item"><a href="index.html#services-section" class="nav-link"><span>Dashboard</span></a></li>
          <li class="nav-item"><a href="index.html#skills-section" class="nav-link"><span>Help</span></a></li>
          <li class="nav-item"><a href="index.html#projects-section" class="nav-link"><span>Threat News</span></a></li>
          <li class="nav-item"><a href="index.html#contact-section" class="nav-link"><span>Contact</span></a></li>
        </ul>
        <div class="theme-toggle-wrap">
          <button type="button" class="theme-toggle-btn" id="theme-toggle-btn" aria-label="Toggle dark and light mode"
            aria-pressed="false">
            <span class="theme-toggle-track" aria-hidden="true">
              <span class="theme-toggle-thumb">
                <i class="theme-icon-moon ion-ios-moon" aria-hidden="true"></i>
                <i class="theme-icon-sun ion-ios-sunny" aria-hidden="true"></i>
              </span>
            </span>
            <span class="visually-hidden">Toggle dark and light mode</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <section class="ftco-section" id="checker-section" style="padding-top: 10em;">
    <div class="checker-cyber-bg" aria-hidden="true">
      <span class="code-layer grid"></span>
      <span class="code-layer rain"></span>
      <span class="code-layer trace"></span>
    </div>
    <div class="container">
      <div class="row justify-content-center pb-5">
        <div class="col-md-10 heading-section text-center ftco-animate">
          <h1 class="big big-2">Checker</h1>
          <h2 class="mb-4">Phishing Checker</h2>
          <p>Paste a suspicious URL or email text to get an instant risk result.</p>
        </div>
      </div>
      <div class="row justify-content-center">
        <div class="col-md-10">
          <div class="bg-dark p-4 p-md-5 rounded threat-card">
            <div class="form-group">
              <label for="checker-url" class="text-white">URL</label>
              <input id="checker-url" type="text" class="form-control" placeholder="https://example.com/login">
            </div>
            <div class="form-group">
              <label for="checker-email" class="text-white">Email Content</label>
              <textarea id="checker-email" rows="6" class="form-control"
                placeholder="Paste email body or suspicious message here"></textarea>
            </div>
            <div class="form-group mb-0">
              <button id="analyze-btn" type="button" class="btn btn-primary py-3 px-5">Analyze Threat</button>
            </div>
            <div id="checker-result" class="mt-4 p-3 bg-black rounded text-white"
              style="border: 1px solid rgba(255,255,255,.15);">
              Enter URL/email and click Analyze Threat.
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="js/jquery.min.js"></script>
  <script src="js/jquery-migrate-3.0.1.min.js"></script>
  <script src="js/popper.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/jquery.easing.1.3.js"></script>
  <script src="js/jquery.waypoints.min.js"></script>
  <script src="js/jquery.stellar.min.js"></script>
  <script src="js/owl.carousel.min.js"></script>
  <script src="js/jquery.magnific-popup.min.js"></script>
  <script src="js/aos.js"></script>
  <script src="js/jquery.animateNumber.min.js"></script>
  <script src="js/scrollax.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Theme toggle
    (function () {
      var toggleBtn = document.getElementById("theme-toggle-btn");
      if (!toggleBtn) return;
      var STORAGE_KEY = "phishguard-theme";
      function applyTheme(theme) {
        var isLight = theme === "light";
        document.body.classList.toggle("light-mode", isLight);
        toggleBtn.setAttribute("aria-pressed", isLight ? "true" : "false");
      }
      var currentTheme = localStorage.getItem(STORAGE_KEY) || "dark";
      applyTheme(currentTheme);
      toggleBtn.addEventListener("click", function () {
        currentTheme = currentTheme === "light" ? "dark" : "light";
        applyTheme(currentTheme);
        localStorage.setItem(STORAGE_KEY, currentTheme);
      });
    })();

    // Nav active state
    (function () {
      var nav = document.getElementById('ftco-nav');
      if (!nav) return;
      nav.querySelectorAll('.nav-item').forEach(function (i) { i.classList.remove('active'); });
      nav.querySelectorAll('.nav-link').forEach(function (l) { l.classList.remove('active'); });
      var checkerLink = nav.querySelector('a[href^="checker.html"]');
      if (checkerLink) {
        checkerLink.classList.add('active');
        checkerLink.parentElement.classList.add('active');
      }
    })();

    // Checker logic
    (function () {
      var urlInput = document.getElementById('checker-url');
      var emailInput = document.getElementById('checker-email');
      var analyzeBtn = document.getElementById('analyze-btn');
      var resultBox = document.getElementById('checker-result');
      var threatCard = document.querySelector('.threat-card');

      function clearCardState() {
        if (threatCard) threatCard.classList.remove('is-analyzing', 'is-risk', 'is-safe');
      }

      analyzeBtn.addEventListener('click', function () {
        // Guard: need at least one input
        if (!urlInput.value.trim() && !emailInput.value.trim()) {
          resultBox.innerHTML = '<div style="color:#fca5a5;">Please enter a URL or email content first.</div>';
          return;
        }

        // Set analyzing state
        clearCardState();
        if (threatCard) threatCard.classList.add('is-analyzing');
        analyzeBtn.disabled = true;
        analyzeBtn.textContent = 'Analyzing...';
        resultBox.innerHTML =
          '<div style="font-weight:700;color:#86efac;">ANALYZING THREAT...</div>' +
          '<div class="mt-1">Processing indicators...</div>';

        var urlVal = urlInput.value.trim();
        var emailVal = emailInput.value.trim();

        var payload = {};
        if (urlVal) payload.url = urlVal;
        if (emailVal) payload.email = emailVal;

        var isLocal = ["localhost", "127.0.0.1", "::1"].indexOf(window.location.hostname) !== -1;
        var apiUrl = (isLocal
          ? "http://127.0.0.1:8000"
          : "https://phishguard-do8t.onrender.com") + "/api/scan";

        fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        })
          .then(function (res) { return res.json(); })
          .then(function (data) {
            var color = data.is_phishing ? "#dc3545" : "#28a745";
            var label = data.is_phishing ? "PHISHING RISK: HIGH" : "LIKELY SAFE";

            var breakdownHtml = '';
            if (data.breakdown && data.breakdown.length) {
              breakdownHtml += '<div class="mt-3" style="border-top:1px solid rgba(255,255,255,0.15);padding-top:12px;">';
              breakdownHtml += '<div style="font-weight:600;margin-bottom:8px;color:#bae6fd;">Why was this flagged?</div>';
              data.breakdown.forEach(function (item) {
                var icon = item.risk ? '❌' : '✅';
                var itemColor = item.risk ? '#fca5a5' : '#86efac';
                breakdownHtml += '<div style="margin-bottom:6px;font-size:13px;">' +
                  icon + ' <span style="color:' + itemColor + ';font-weight:600;">' + item.label + '</span>' +
                  ' — <span style="color:#e2e8f0;">' + item.value + '</span></div>';
              });
              breakdownHtml += '</div>';
            }

            resultBox.innerHTML =
              '<div style="font-weight:700;color:' + color + ';">' + label + '</div>' +
              '<div class="mt-1">Risk Score: <strong>' + data.score + '/100</strong></div>' +
              '<div class="mt-1">Model says: <strong>' + data.label + '</strong></div>' +
              breakdownHtml;

            clearCardState();
            if (threatCard) threatCard.classList.add(data.is_phishing ? 'is-risk' : 'is-safe');
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = 'Analyze Threat';
          })
          .catch(function () {
            resultBox.innerHTML = '<div style="color:#fca5a5;">Error connecting to backend. Is the server running?</div>';
            clearCardState();
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = 'Analyze Threat';
          });
      });

      // Auto-focus based on URL param
      var mode = new URLSearchParams(window.location.search).get('mode');
      if (mode === 'url') urlInput.focus();
      else if (mode === 'email') emailInput.focus();
    })();
  </script>

  <script src="js/chat-widget.js"></script>

</body>

</html>
