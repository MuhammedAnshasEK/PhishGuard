<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PhishGuard AI Chat</title>
  <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #020617;
      --panel: #0b1222;
      --border: rgba(56, 189, 248, 0.3);
      --text: #e2e8f0;
      --muted: #93c5fd;
      --user: #0369a1;
      --bot: #1e293b;
      --accent: #0ea5e9;
      --danger: #fca5a5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(14, 165, 233, 0.12), transparent 35%),
        radial-gradient(circle at 80% 90%, rgba(239, 68, 68, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body.light-mode {
      --bg: #f8fbff;
      --panel: #ffffff;
      --border: rgba(14, 116, 144, 0.28);
      --text: #0f172a;
      --muted: #0c4a6e;
      --user: #0284c7;
      --bot: #e2e8f0;
      --accent: #0ea5e9;
      --danger: #b91c1c;
      background:
        radial-gradient(circle at 20% 10%, rgba(56, 189, 248, 0.16), transparent 35%),
        radial-gradient(circle at 80% 90%, rgba(239, 68, 68, 0.1), transparent 35%),
        var(--bg);
    }

    .chat-shell {
      width: min(920px, 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(11, 18, 34, 0.97), rgba(3, 8, 24, 0.97));
      box-shadow: 0 20px 45px rgba(2, 6, 23, 0.55);
    }

    body.light-mode .chat-shell {
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.14);
    }

    .chat-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .chat-title {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.3px;
    }

    body.light-mode .chat-title {
      color: #0f172a;
    }

    .chat-brand {
      display: flex;
      flex-direction: column;
    }

    .brand-logo {
      display: inline-block;
      font-family: "Montserrat", "Poppins", sans-serif;
      font-size: 33px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: transparent;
      background: linear-gradient(90deg, #a5f3fc 0%, #67e8f9 30%, #22d3ee 62%, #0ea5e9 82%, #0369a1 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .chat-subtitle {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chat-back {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }

    .chat-back:hover,
    .chat-back:focus {
      color: #e0f2fe;
    }

    body.light-mode .chat-back:hover,
    body.light-mode .chat-back:focus {
      color: #0f172a;
    }

    .chat-log {
      height: min(62vh, 540px);
      overflow-y: auto;
      padding: 16px;
    }

    body.light-mode .chat-log {
      background: rgba(248, 250, 252, 0.8);
    }

    .msg {
      max-width: 86%;
      padding: 10px 12px;
      border-radius: 12px;
      margin: 0 0 10px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.bot {
      background: var(--bot);
    }

    body.light-mode .msg.bot {
      color: #0f172a;
      border: 1px solid rgba(148, 163, 184, 0.45);
    }

    .msg.user {
      margin-left: auto;
      background: var(--user);
      color: #e0f2fe;
    }

    body.light-mode .msg.user {
      color: #f8fafc;
    }

    .chat-form {
      border-top: 1px solid var(--border);
      padding: 14px;
    }

    .chat-row {
      display: flex;
      gap: 10px;
    }

    .chat-input {
      flex: 1;
      min-height: 50px;
      max-height: 160px;
      resize: vertical;
      border: 1px solid rgba(148, 163, 184, 0.45);
      border-radius: 10px;
      padding: 12px;
      font: inherit;
      background: #f8fafc;
      color: #0f172a;
    }

    body.light-mode .chat-input {
      background: #ffffff;
      color: #0f172a;
    }

    .chat-input:focus {
      outline: none;
      border-color: rgba(14, 165, 233, 0.8);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
    }

    .chat-send {
      border: 0;
      background: #0ea5e9;
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.12em;
      border-radius: 10px;
      padding: 0 18px;
      min-width: 110px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease, background 0.35s ease;
      animation: heroButtonFloat 2.8s ease-in-out infinite;
    }

    .chat-send::before {
      content: "";
      position: absolute;
      top: 0;
      left: -130%;
      width: 55%;
      height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.4) 50%, transparent 100%);
      transform: skewX(-20deg);
      transition: left 0.55s ease;
    }

    .chat-send:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 14px 28px -10px rgba(255, 189, 57, 0.7);
      background: #0284c7;
    }

    .chat-send:hover::before {
      left: 130%;
    }

    body.light-mode .chat-send {
      background: #0284c7;
      color: #ffffff;
    }

    body.light-mode .chat-send:hover {
      background: #0369a1;
    }

    .chat-send:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      animation: none;
    }

    .chat-send:disabled::before {
      display: none;
    }

    .chat-status {
      margin: 10px 2px 2px;
      min-height: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    body.light-mode .chat-status {
      color: #0c4a6e;
    }

    .chat-status.is-error {
      color: var(--danger);
    }

    .chat-note {
      margin: 0;
      padding: 0 16px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .chat-note a {
      color: #ef4444;
      font-weight: 600;
    }

    body.light-mode .chat-note a {
      color: #ef4444;
    }

    .chat-note a:hover,
    .chat-note a:focus,
    body.light-mode .chat-note a:hover,
    body.light-mode .chat-note a:focus {
      color: #b91c1c;
    }

    @media (max-width: 640px) {
      .brand-logo {
        font-size: 26px;
      }

      .chat-row {
        flex-direction: column;
      }

      .chat-send {
        min-height: 44px;
      }

      .chat-log {
        height: 56vh;
      }
    }

    @keyframes heroButtonFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-2px);
      }
    }
  </style>
</head>

<body>
  <main class="chat-shell">
    <header class="chat-head">
      <div class="chat-brand">
        <span class="brand-logo">PhishGuard</span>
        <p class="chat-subtitle">AI Support Chat</p>
      </div>
      <a class="chat-back" href="index.html#skills-section" id="chat-back-link">Back to Help</a>
    </header>

    <section id="chat-log" class="chat-log" aria-live="polite">
      <div class="msg bot">Hello, I am your PhishGuard AI assistant. Ask me about suspicious links, phishing emails, and
        safe next steps.</div>
    </section>

    <form id="chat-form" class="chat-form">
      <div class="chat-row">
        <textarea id="chat-input" class="chat-input" name="message" maxlength="1200" placeholder="Type your question..."
          required></textarea>
        <button type="submit" id="chat-send" class="chat-send">SEND</button>
      </div>
      <p id="chat-status" class="chat-status"></p>
    </form>
    <p class="chat-note">Need human support? <a
        href="mailto:phishguardsupport@gmail.com">phishguardsupport@gmail.com</a></p>
  </main>

  <script>
    (function () {
      var THEME_KEY = "phishguard-theme";
      function resolveTheme() {
        try {
          var saved = localStorage.getItem(THEME_KEY);
          if (saved === "light" || saved === "dark") return saved;
        } catch (_err) { }
        try {
          if (window.opener && window.opener.document && window.opener.document.body) {
            return window.opener.document.body.classList.contains("light-mode") ? "light" : "dark";
          }
        } catch (_err2) { }
        return "dark";
      }
      function applyTheme(theme) {
        document.body.classList.toggle("light-mode", theme === "light");
      }
      applyTheme(resolveTheme());

      var form = document.getElementById("chat-form");
      var input = document.getElementById("chat-input");
      var sendBtn = document.getElementById("chat-send");
      var statusEl = document.getElementById("chat-status");
      var logEl = document.getElementById("chat-log");
      var backLink = document.getElementById("chat-back-link");
      if (!form || !input || !sendBtn || !statusEl || !logEl || !backLink) return;

      // ✅ FIXED: Now checks ["localhost", "127.0.0.1", "::1"] instead of just "localhost"
      var isLocal = ["localhost", "127.0.0.1", "::1"].indexOf(window.location.hostname) !== -1;
      var API_BASE_URL = isLocal
        ? "http://localhost:8000"
        : "phishguard-do8t.onrender.com";
      var API_ENDPOINT = API_BASE_URL + "/api/chat";
      var SESSION_KEY = "phishguard_chat_session_id";

      function getSessionId() {
        try {
          var existing = localStorage.getItem(SESSION_KEY);
          if (existing) return existing;
          var generated = "sess_" + Math.random().toString(36).slice(2, 12) + "_" + Date.now().toString(36);
          localStorage.setItem(SESSION_KEY, generated);
          return generated;
        } catch (_err) {
          return "sess_" + Date.now().toString(36);
        }
      }
      var sessionId = getSessionId();

      backLink.addEventListener("click", function (event) {
        event.preventDefault();
        if (window.opener && !window.opener.closed) {
          try {
            window.opener.focus();
            window.opener.location.hash = "skills-section";
          } catch (_err) {
            // Ignore cross-window access issues and fallback below.
          }
          window.close();
          return;
        }
        window.location.href = "index.html#skills-section";
      });

      function setStatus(message, isError) {
        statusEl.textContent = message || "";
        statusEl.classList.toggle("is-error", !!isError);
      }

      function appendMessage(role, text) {
        var node = document.createElement("div");
        node.className = "msg " + (role === "user" ? "user" : "bot");
        node.textContent = text;
        logEl.appendChild(node);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function sendMessage(message) {
        return fetch(API_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sessionId: sessionId,
            message: message
          })
        }).then(function (res) {
          return res.json().catch(function () { return {}; }).then(function (data) {
            if (!res.ok) {
              throw new Error((data && data.error) || "Failed to get response.");
            }
            return data;
          });
        });
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        var message = (input.value || "").toString().trim();
        if (!message) {
          setStatus("Please type a question before sending.", true);
          return;
        }

        appendMessage("user", message);
        input.value = "";
        input.focus();
        sendBtn.disabled = true;
        setStatus("Assistant is thinking...", false);

        sendMessage(message)
          .then(function (data) {
            appendMessage("bot", (data && data.reply) || "I could not generate a response right now.");
            setStatus("Response received.", false);
          })
          .catch(function (err) {
            appendMessage("bot", "I could not answer right now. Please contact phishguardsupport@gmail.com.");
            setStatus((err && err.message) || "Could not reach chat service.", true);
          })
          .finally(function () {
            sendBtn.disabled = false;
          });
      });
    })();
  </script>
</body>

</html>
